<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学周辺野の花マップ</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* メニューコンテナ */
        .menu-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 1;
            font-size: 14px;
            overflow: hidden;
        }

        /* メニューヘッダー */
        .menu-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }
                
        /* タイトル */
        .menu-title {
            margin: 0;
            font-weight: bold;
            line-height: 1.4;
            flex: 1;
        }
        
        /* ハンバーガーボタン表示切り替え */
        #menu-toggle {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            font-size: 22px;
            line-height: 32px;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
        }
        #menu-toggle:hover {
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
        }

        /* ハンバーガーメニュー開閉 */
        #menu-content {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid #ddd;
            max-height: 40vh;
            overflow-y: hidden;
            scrollbar-gutter: stable;
            opacity: 1;
            transition:
                max-height .4s cubic-bezier(0.2, 0.8, 0.2, 1), 
                opacity .2s ease, 
                padding 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #menu-content.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            padding-top: 0;
            border-top: none;
            overflow: hidden;
        }

        /* 科折りたたみ＋インデント */
        .family-children {
            margin-left: 18px;
            overflow: hidden;
            max-height: 500px;
            transition: max-height 0.3s ease, opacity 0.2s ease;
            opacity: 1;
        }
        .family-children.collapsed {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .family-header {
            cursor: pointer;
            user-select: none;
        }
        .family-toggle {
            width: 16px;
            display: inline-block;
        }
        
        /* メニュー項目 */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        
        .menu-item input {
            margin:0;
            flex-shrink:0;
        }

        .menu-item.child {
            padding-left: 18px;
        }
        
        .menu-item span:last-child{
            flex:1;
        }

        .menu-footer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #ddd;
        }
        
        .color-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* 背景グレー化のアイコン */
        .gray-square-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 1px solid #777777; /* グレーの枠線 */
            background-color: #e0e0e0; /* 内側の薄いグレー */
            border-radius: 2px; /* 少しだけ角を丸く（完全な四角なら0に） */
            flex-shrink: 0;
            margin-right: 6px;
        }

        /* ポップアップ内のカスタムスタイル */
        .popup-content { font-size: 13px; line-height: 1.4; max-width: 220px; }
        .popup-title { font-weight: bold; font-size: 15px; margin-bottom: 6px; border-bottom: 1px solid #ccc; padding-bottom: 2px; }
        .popup-img { width: 100%; height: auto; margin-top: 8px; border-radius: 4px; object-fit: cover; max-height: 150px; }
    </style>
</head>
<body>
    <!-- 切り替えメニュー -->
    <div class="menu-container">
        <div class="menu-header">
            <button id="menu-toggle" aria-label="メニュー">✕</button>
            <div class="menu-title">
                大妻女子大学周辺<br>
                野の花マップ
            </div>
        </div>
    
        <!-- 科ごとの植物名リスト：折りたたまれる部分 -->
        <div id="menu-content"></div>
    
        <!-- 常に表示 -->
        <div class="menu-footer">
            <label class="menu-item">
                <input type="checkbox" id="check-grayscale">
                <span class="gray-square-icon"></span>
                <span>グレー地図</span>
            </label>
        </div>
    </div>
    
    <div id="map"></div>
    
    <script>
        // 設定値
        const CONFIG = {
            cdnBase: 'https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist',
            osmTile: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            mapCenter: [139.7437, 35.6897],
            zoom: 15
        };
        
        // 植物データ
        const PLANTS = [
            {
                id: "onitabirako",
                species: "オニタビラコ",
                family: "キク科",
                familyId: "kiku",
                color: "#ffa502"
            },
            {
                id: "tanpopo",
                species: "タンポポ",
                family: "キク科",
                familyId: "kiku",
                color: "#ffec3d"
            }
        ];
        
        // CSS
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = CONFIG.cdnBase + '/maplibre-gl.css';
        document.head.appendChild(link);
    
        // JS
        const script = document.createElement('script');
        script.src = CONFIG.cdnBase + '/maplibre-gl.js';
        script.onload = () => initMap();
        script.onerror = (e) => {
            console.error("MapLibre load failed", e);
            console.error("URL:", script.src);
        };
    
        document.head.appendChild(script);
    
        function initMap() {
            // ハンバーガーメニュー開閉
            const menuToggle = document.getElementById("menu-toggle");
            const menuContent = document.getElementById("menu-content");
            let isOpen = true;
            menuToggle.addEventListener("click", () => {
                isOpen = !isOpen;
                menuContent.classList.toggle("collapsed");
                menuToggle.textContent = isOpen ? "✕" : "☰";
            });
    
            // 科の開閉（▼トグル）
            document.querySelectorAll('.family-header').forEach(header => {
                const family = header.dataset.family;
                const children = document.querySelector(`.family-children[data-family="${family}"]`);
                const toggleIcon = header.querySelector('.family-toggle');
                // 初期状態：折りたたみ
                children.classList.add('collapsed');
                toggleIcon.textContent = '▶';
                header.addEventListener('click', (e) => {
                    // チェックボックスクリックは除外（重要）
                    if (e.target.tagName === 'INPUT') return;
                    const isCollapsed = children.classList.toggle('collapsed');
                    toggleIcon.textContent = isCollapsed ? '▶' : '▼';
                });
            });
    
            // 科ごとの種数を表示
            document.querySelectorAll('.family-header').forEach(header => {
                const family = header.dataset.family;
                const count = document.querySelectorAll(
                    `.family-children[data-family="${family}"] input[type="checkbox"]`
                ).length;
                header.querySelector('.species-count').textContent = `（${count}）`;
            });
            
            // 科（親）と種（子）の同期制御
            const familyStates = new Map();
                // 子 → 親更新
                function updateFamilyState(family) {
                    const children = document.querySelectorAll(`input[data-family="${family}"]:not(.family-checkbox)`);
                    const parent = document.querySelector(`.family-checkbox[data-family="${family}"]`);
                    const checkedCount = [...children].filter(c => c.checked).length;
                    if (checkedCount === 0) {
                        parent.checked = false;
                        parent.indeterminate = false;
                    } else if (checkedCount === children.length) {
                        parent.checked = true;
                        parent.indeterminate = false;
                    } else {
                        parent.checked = false;
                        parent.indeterminate = true;
                    }
                }
                // 親 → 子制御
                document.querySelectorAll('.family-checkbox').forEach(parent => {
                    parent.addEventListener('change', (e) => {
                        const family = parent.dataset.family;
                        const children = document.querySelectorAll(
                            `input[data-family="${family}"]:not(.family-checkbox)`
                        );
                        children.forEach(c => {
                            c.checked = e.target.checked;
                            const layerId = `layer-${c.id.replace('check-', '')}-points`;
                            if (map.getLayer(layerId)) {
                                map.setLayoutProperty(
                                    layerId,
                                    'visibility',
                                    e.target.checked ? 'visible' : 'none'
                                );
                            }
                        });
                        updateFamilyState(family);
                    });
                });
    
            // マップ制御
            const osmUrl = CONFIG.osmTile;
            const map = new maplibregl.Map({
                container: 'map',
                center: CONFIG.mapCenter,
                zoom: CONFIG.zoom,
                style: {
                    version: 8,
                    sources: {
                        'osm-tiles': {
                            type: 'raster',
                            tiles: [osmUrl],
                            tileSize: 256,
                            attribution: '© OpenStreetMap contributors'
                        }
                    },
                    layers: [
                        { id: 'osm-layer', type: 'raster', source: 'osm-tiles', minzoom: 0, maxzoom: 19 }
                    ]
                }
            });
            map.addControl(new maplibregl.NavigationControl());
    
            // 背景の色彩設定（チェックボックス連動）
            document.getElementById('check-grayscale').addEventListener('change', (e) => {
                const saturationValue = e.target.checked ? -1 : 0;
                map.setPaintProperty('osm-layer', 'raster-saturation', saturationValue);
            });
    
            // 植物ポイントデータ描画
            map.on('load', () => {
                // GeoJSONソースとレイヤーを追加
                PLANTS.forEach(plant => {
                    map.addSource(`source-${plant.id}`, {
                        type: 'geojson',
                        data: `geojson/${plant.id}.geojson`
                    });
                    map.addLayer({
                        id: `layer-${plant.id}-points`,
                        type: 'circle',
                        source: `source-${plant.id}`,
                        layout: {
                            visibility: 'visible'
                        },
                        paint: {
                            'circle-radius': 6,
                            'circle-color': plant.color,
                            'circle-stroke-width': 1,
                            'circle-stroke-color': '#ffffff'
                        }
                    });
                });
    
                // 植物レイヤ表示切り替え
                document.querySelectorAll('input[id^="check-"]').forEach((checkbox) => {
                    // グレー地図は除外
                    if (checkbox.id === "check-grayscale") return;
                    // check- を取り除く
                    const flower = checkbox.id.replace("check-", "");
                    // レイヤー名を組み立てる
                    const layerId = `layer-${flower}-points`;
                    // レイヤーが存在するときだけイベント登録
                    if (map.getLayer(layerId)) {
                        checkbox.addEventListener("change", (e) => {
                            const family = checkbox.dataset.family;
                            if (family) updateFamilyState(family);
                            map.setLayoutProperty(
                                layerId,
                                "visibility",
                                e.target.checked ? "visible" : "none"
                            );
                        });
                    }
                });
    
                // ポップアップ設定
                const setupPopup = (layerId) => {
                    map.on('click', layerId, (e) => {
                        // ★【修正】配列の最初の要素を指定するように書き換えました
                        const coordinates = e.features[0].geometry.coordinates.slice();
                        const props = e.features[0].properties;
                        const species = props.species || '不明';
                        const date = props.date || '未記録';
                        const note = props.note || 'なし';
                        const imageFile = props.image || ''; 
                        let popupHtml = `
                            <div class="popup-content">
                                <div class="popup-title">🌱 ${species}</div>
                                <div><strong>日時:</strong> ${date}</div>
                                <div><strong>備考:</strong> ${note}</div>
                        `;
                        if (imageFile) {
                            popupHtml += `<img src="./image/${imageFile}" class="popup-img" alt="${species}">`;
                        }
                        popupHtml += `</div>`;
                        new maplibregl.Popup().setLngLat(coordinates).setHTML(popupHtml).addTo(map);
                    });
                    map.on('mouseenter', layerId, () => { map.getCanvas().style.cursor = 'pointer'; });
                    map.on('mouseleave', layerId, () => { map.getCanvas().style.cursor = ''; });
                };
                setupPopup('layer-onitabirako-points');
                setupPopup('layer-tanpopo-points');
            });
            document.querySelectorAll('.family-checkbox').forEach(parent => {
                updateFamilyState(parent.dataset.family);
            });
        }
    </script>
</body>
</html>
