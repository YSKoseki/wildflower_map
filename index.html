<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学周辺野の花マップ</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* メニュー全体 */
        .menu-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 1;
            font-size: 14px;
            overflow: hidden;
        }

        /* 概要部分 */
        .menu-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .menu-title {
            margin: 0;
            font-weight: bold;
            line-height: 1.4;
            flex: 1;
        }
        .menu-summary {
            margin-top: 4px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #555;
        }
        
        /* ハンバーガーボタン */
        #menu-toggle {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            font-size: 22px;
            line-height: 32px;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
        }
        #menu-toggle:hover {
            background: rgba(0,0,0,0.08);
            border-radius: 4px;
        }

        /*　植物リスト部分 */
        #menu-content {
            margin-top: 0px;
            padding-top: 8px;
            border-top: 2px solid #ddd;
            max-height: 40vh;
            overflow-y: hidden;
            scrollbar-gutter: stable;
            opacity: 1;
            transition:
                max-height .4s cubic-bezier(0.2, 0.8, 0.2, 1), 
                opacity .2s ease, 
                padding 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #menu-content.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            padding-top: 0;
            border-top: none;
            overflow: hidden;
        }

        /* 科メニュー */
        .family-children {
            margin-left: 18px;
            overflow: hidden;
            max-height: 500px;
            transition: max-height 0.3s ease, opacity 0.2s ease;
            opacity: 1;
        }
        .family-children.collapsed {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .family-header {
            cursor: pointer;
            user-select: none;
        }
        .family-toggle {
            width: 16px;
            display: inline-block;
        }
        
        /* 種メニュー */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .menu-item input {
            margin:0;
            flex-shrink:0;
        }
        .menu-item.child {
            padding-left: 18px;
        }
        .menu-item span:last-child{
            flex:1;
        }
        .menu-footer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #ddd;
        }
        .color-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* グレー地図のアイコン */
        .gray-square-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 1px solid #777; /* グレーの枠線 */
            background-color: #e0e0e0; /* 内側の薄いグレー */
            border-radius: 2px; /* 少しだけ角を丸く（完全な四角なら0に） */
            flex-shrink: 0;
            margin-right: 6px;
        }

        /* ポップアップ内のカスタムスタイル */
        .popup-content {
            font-size: 13px;
            line-height: 1.4;
            max-width: 220px;
        }
        .popup-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 6px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 2px;
        }
        .popup-img {
            width: 100%;
            height: auto;
            margin-top: 8px;
            border-radius: 4px;
            object-fit: cover;
            max-height: 150px;
        }
    </style>
</head>
<body>
    <!-- 切り替えメニュー -->
    <div class="menu-container">
        <!-- メニューのヘッダー -->
        <div class="menu-header">
            <button id="menu-toggle" aria-label="メニュー">✕</button>
            <div>
                <div class="menu-title">
                    大妻女子大学周辺<br>
                    野の花マップ
                </div>
                <div id="menu-summary" class="menu-summary">
                    登録数: 0科 0種 0地点
                </div>
            </div>
        </div>
    
        <!-- 科ごとの植物名リスト：折りたたまれる部分 -->
        <div id="menu-content"></div>
    
        <!-- 常に表示 -->
        <div class="menu-footer">
            <label class="menu-item">
                <input type="checkbox" id="check-grayscale">
                <span class="gray-square-icon"></span>
                <span>グレー地図</span>
            </label>
        </div>
    </div>
    
    <div id="map"></div>
    
    <script src="plants.js"></script>

    <script>
        // 設定値
        const CONFIG = {
            cdnBase: 'https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist',
            osmTile: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            mapCenter: [139.743650, 35.692126],
            zoom: 15
        };

        // 大学情報
        const UNIVERSITY = {
            name: "大妻女子大学",
            lngLat: [139.743611, 35.690833]
        };

        // 大学マーカー追加関数
        function addUniversityMarker(map) {
            const marker = document.createElement("div");
            marker.textContent = "🎓";
            marker.style.fontSize = "28px";
            marker.style.cursor = "pointer";
            marker.title = "大妻女子大学";
            new maplibregl.Marker({
                element: marker
            })
                .setLngLat([139.743611, 35.690833])
                .setPopup(
                    new maplibregl.Popup().setText("大妻女子大学")
                )
                .addTo(map);
        }

        // レイヤID生成関数
        function getLayerId(plantId) {
            return `layer-${plantId}-points`;
        }

        // ソースID生成関数
        function getSourceId(plantId) {
            return `source-${plantId}`;
        }

        // 植物データを科ごとにまとめる関数
        function groupPlantsByFamily() {
            const families = {};
            PLANTS.forEach(plant => {
                if (!families[plant.familyId]) {
                    families[plant.familyId] = {
                        species: []
                    };
                }
                families[plant.familyId].species.push(plant);
            });
            return families;
        }

        // 科ごとのHTML生成関数
        function createFamilyHtml(familyId, family) {
            return `
                <div class="menu-item family-header" data-family="${familyId}">
                    <span class="family-toggle">▶</span>
                    <input type="checkbox" class="family-checkbox" data-family="${familyId}">
                    <span>
                        <strong>
                            ${FAMILIES[familyId].name}
                            <span class="species-count">（${family.species.length}）</span>
                        </strong>
                    </span>
                </div>
                <div class="family-children collapsed" data-family="${familyId}">
                    ${family.species.map(plant => `
                        <div class="menu-item child">
                            <input type="checkbox" id="check-${plant.id}" data-family="${familyId}" checked>
                            <span class="color-badge" style="background:${plant.color};"></span>
                            <span>
                                ${plant.species}
                                <span id="point-count-${plant.id}">
                                    （${plant.pointCount ?? 0}）
                                </span>
                            </span>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        // メニューの地点数表示更新関数
        function updatePointCounts() {
            PLANTS.forEach(plant => {
                const pointCount = document.getElementById(
                    `point-count-${plant.id}`
                );
                if (pointCount) {
                    pointCount.textContent = `（${plant.pointCount ?? 0}）`;
                }
            });
        }

        // メニュー概要（科・種・地点数）更新関数
        function updateMenuSummary() {
            // 科数
            const familyCount = Object.keys(groupPlantsByFamily()).length;
            // 種数
            const speciesCount = PLANTS.length;
            // 地点数
            const pointCount = PLANTS.reduce(
                (sum, plant) => sum + (plant.pointCount ?? 0),
                0
            );
            // 表示
            document.getElementById("menu-summary").textContent =
                `登録数: ${familyCount}科 ${speciesCount}種 ${pointCount}地点`;
        }        

        // メニューコンテンツ生成関数
        function buildMenu() {
            const menu = document.getElementById("menu-content");
            // 科ごとにまとめる
            const families = groupPlantsByFamily();
            // HTML文字列を組み立てる
            menu.innerHTML = "";
            // 科ごとにHTMLを生成して追加
            Object.entries(families).forEach(([familyId, family]) => {
                const group = document.createElement("div");
                group.innerHTML = createFamilyHtml(familyId, family);
                menu.appendChild(group);
            });
        }

        // ポップアップHTML生成関数
        function createPopupHtml(plant, props) {
            const species = plant.species;
            const datetime = props.datetime || "未記録";
            const note = props.note || "なし";
            const photoId = props.photoId || "";
            let html = `
                <div class="popup-content">
                    <div class="popup-title">🌱 ${species}</div>
                    <div><strong>日時:</strong> ${datetime}</div>
                    <div><strong>備考:</strong> ${note}</div>
            `;
            if (photoId) {
                html += `
                    <img
                        src="./image/${plant.id}/${photoId}.jpg"
                        class="popup-img"
                        alt="${species}">
                `;
            }
            html += `</div>`;
            return html;
        }

        // ポップアップ設定関数
        function setupPopup(map, plant) {
            const layerId = getLayerId(plant.id);
            map.on("click", layerId, (e) => {
                const coordinates = e.features[0].geometry.coordinates.slice();
                const props = e.features[0].properties;
                const popupHtml = createPopupHtml(plant, props);
                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(popupHtml)
                    .addTo(map);
            });
            map.on("mouseenter", layerId, () => {
                map.getCanvas().style.cursor = "pointer";
            });
            map.on("mouseleave", layerId, () => {
                map.getCanvas().style.cursor = "";
            });
        }

        // 植物レイヤ追加関数
        async function addPlantLayer(map, plant) {
            // GeoJSONを読み込む
            const response = await fetch(`geojson/${plant.id}.geojson`);
            const geojson = await response.json();

            // 地点数を保存
            plant.pointCount = geojson.features.length;

            // ソース追加
            map.addSource(getSourceId(plant.id), {
                type: "geojson",
                data: geojson
            });

            // レイヤ追加
            map.addLayer({
                id: getLayerId(plant.id),
                type: "circle",
                source: getSourceId(plant.id),
                layout: {
                    visibility: "visible"
                },
                paint: {
                    "circle-radius": 6,
                    "circle-color": plant.color,
                    "circle-stroke-width": 1,
                    "circle-stroke-color": plant.strokeColor
                }
            });
        }

        // レイヤ表示切り替え関数
        function setupLayerToggle(map, plant) {
            const checkbox = document.getElementById(`check-${plant.id}`);
            if (!checkbox) return;
            const layerId = getLayerId(plant.id);
            checkbox.addEventListener("change", e => {
                if (map.getLayer(layerId)) {
                    map.setLayoutProperty(
                        layerId,
                        "visibility",
                        e.target.checked ? "visible" : "none"
                    );
                }
                updateFamilyState(plant.familyId);
            });
        }

        // 植物レイヤのインタラクション設定関数
        function setupPlantInteractions(map, plant) {
            setupLayerToggle(map, plant);
            setupPopup(map, plant);
        }

        // 植物レイヤ初期化処理関数（個別）
        async function initializePlantLayer(map, plant) {
            await addPlantLayer(map, plant);
            setupPlantInteractions(map, plant);
        }

        // 植物レイヤ初期化処理関数（まとめて）
        async function setupPlantLayers(map) {
            for (const plant of PLANTS) {
                await initializePlantLayer(map, plant);
            }
        }

         // ハンバーガーメニュー開閉関数
        function setupHamburgerMenu() {
            const menuToggle = document.getElementById("menu-toggle");
            const menuContent = document.getElementById("menu-content");
            let isOpen = true;
            menuToggle.addEventListener("click", () => {
                isOpen = !isOpen;
                menuContent.classList.toggle("collapsed");
                menuToggle.textContent = isOpen ? "✕" : "☰";
            });
        }

        // 科開閉（▼トグルボタン）関数
        function setupFamilyToggle() {
            document.querySelectorAll('.family-header').forEach(header => {
                const family = header.dataset.family;
                const children = document.querySelector(`.family-children[data-family="${family}"]`);
                const toggleIcon = header.querySelector('.family-toggle');
                // 初期状態：折りたたみ
                children.classList.add('collapsed');
                toggleIcon.textContent = '▶';
                header.addEventListener('click', (e) => {
                    // チェックボックスクリックは除外（重要）
                    if (e.target.tagName === 'INPUT') return;
                    const isCollapsed = children.classList.toggle('collapsed');
                    toggleIcon.textContent = isCollapsed ? '▶' : '▼';
                });
            });
        }

        // 科（親）と種（子）の状態同期関数
        function updateFamilyState(family) {
            const children = document.querySelectorAll(`input[data-family="${family}"]:not(.family-checkbox)`);
            const parent = document.querySelector(`.family-checkbox[data-family="${family}"]`);
            const checkedCount = [...children].filter(c => c.checked).length;
            if (checkedCount === 0) {
                parent.checked = false;
                parent.indeterminate = false;
            } else if (checkedCount === children.length) {
                parent.checked = true;
                parent.indeterminate = false;
            } else {
                parent.checked = false;
                parent.indeterminate = true;
            }
        }
        
        // 科チェックボックスイベント設定関数
        function setupFamilyCheckboxes(map) {
            document.querySelectorAll('.family-checkbox').forEach(parent => {
                parent.addEventListener('change', (e) => {
                    const family = parent.dataset.family;
                    const children = document.querySelectorAll(
                        `input[data-family="${family}"]:not(.family-checkbox)`
                    );
                    children.forEach(c => {
                        c.checked = e.target.checked;
                        const plantId = c.id.replace("check-", "");
                        const layerId = getLayerId(plantId);
                        if (map.getLayer(layerId)) {
                            map.setLayoutProperty(
                                layerId,
                                'visibility',
                                e.target.checked ? 'visible' : 'none'
                            );
                        }
                    });
                    updateFamilyState(family);
                });
            });
            document.querySelectorAll(".family-checkbox").forEach(parent => {
                updateFamilyState(parent.dataset.family);
            });
        }

        // グレー地図切り替え設定関数
        function setupGrayscaleToggle(map) {
            document.getElementById("check-grayscale").addEventListener("change", (e) => {
                const saturationValue = e.target.checked ? -1 : 0;
                map.setPaintProperty("osm-layer", "raster-saturation", saturationValue);
            });
        }

        // メニュー初期化関数
        function setupMenu(map) {
            // メニューの構築
            buildMenu();
            // メニューの開閉（ハンバーガーボタン）
            setupHamburgerMenu();
            // 科の開閉（▼トグルボタン）
            setupFamilyToggle();
            // 科（親）と種（子）の状態同期
            setupFamilyCheckboxes(map);
            // グレー地図切り替え
            setupGrayscaleToggle(map);
        }

        // マップ生成関数
        function createMap() {
            const map = new maplibregl.Map({
                container: "map",
                center: CONFIG.mapCenter,
                zoom: CONFIG.zoom,
                style: {
                    version: 8,
                    sources: {
                        "osm-tiles": {
                            type: "raster",
                            tiles: [CONFIG.osmTile],
                            tileSize: 256,
                            attribution: "© OpenStreetMap contributors"
                        }
                    },
                    layers: [
                        {
                            id: "osm-layer",
                            type: "raster",
                            source: "osm-tiles",
                            minzoom: 0,
                            maxzoom: 19
                        }
                    ]
                }
            });
            map.addControl(new maplibregl.NavigationControl());
            return map;
        }
        
        // マップロード時の処理関数
        async function onMapLoad(map) {
            await setupPlantLayers(map);
            // 地点数表示を更新
            updatePointCounts();
            // メニュー概要を更新
            updateMenuSummary();
            // 大学マーカーを追加
            addUniversityMarker(map);
        }

        // マップイベント設定関数
        function setupMapEvents(map) {
            map.on("load", () => {
                onMapLoad(map);
            });
        }

        // マップ初期化関数
        function initMap() {
            // マップの生成
            const map = createMap();
            // メニューの初期化
            setupMenu(map);
            // マップロードイベント処理
            setupMapEvents(map);
        }

        // CSS
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = CONFIG.cdnBase + '/maplibre-gl.css';
        document.head.appendChild(link);
    
        // JS
        const script = document.createElement('script');
        script.src = CONFIG.cdnBase + '/maplibre-gl.js';
        script.onload = () => initMap();
        script.onerror = (e) => {
            console.error("MapLibre load failed", e);
            console.error("URL:", script.src);
        };
    
        document.head.appendChild(script);
    </script>
</body>
</html>
